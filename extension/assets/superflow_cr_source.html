<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SuperFLOW Brand</title>
    <style>
      html,
      body {
        margin: 0;
        width: 360px;
        height: 160px;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      svg {
        display: block;
        width: 360px;
        height: 160px;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 360 160" role="img" aria-label="SuperFLOW">
      <defs>
        <linearGradient id="waveMain" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#84e8ff" />
          <stop offset="30%" stop-color="#34c2ff" />
          <stop offset="64%" stop-color="#137ee0" />
          <stop offset="100%" stop-color="#0d4c97" />
        </linearGradient>
        <linearGradient id="waveFoam" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#d8f6ff" />
        </linearGradient>
        <linearGradient id="superFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffe55f" />
          <stop offset="52%" stop-color="#ffb000" />
          <stop offset="100%" stop-color="#ff7a00" />
        </linearGradient>
        <linearGradient id="flowFill" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#caf6ff" />
          <stop offset="50%" stop-color="#68ddff" />
          <stop offset="100%" stop-color="#1690ff" />
        </linearGradient>
        <filter id="brandShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0a4b96" flood-opacity="0.16" />
        </filter>
      </defs>

      <g filter="url(#brandShadow)">
        <path
          d="M85 35c-33 4-61 25-73 55-9 21-7 42 4 57 8 10 22 12 33 4 12-8 20-23 26-42 6-18 11-30 20-38 8-7 19-10 31-9-5 8-8 17-9 27-2 30 13 49 40 63-21 7-44 6-63-4-7-3-12 6-7 11 25 22 67 24 97 6 26-16 36-41 32-72-5-42-34-65-75-63-2 0-6 0-11 1-15 1-24-1-33-7-4-3-10-2-14 3-5 5-2 14 5 18 9 4 18 6 29 5z"
          fill="url(#waveMain)"
          stroke="#0b4c95"
          stroke-width="6"
          stroke-linejoin="round"
        />
        <path
          d="M55 43c18 7 28 16 36 28-18-5-33 0-43 11-10 11-13 24-16 40-3 16-9 28-19 36-5 4-11 6-17 6 1 3 3 6 5 9 7 8 19 9 28 4 10-7 17-18 23-35 7-21 13-34 23-44 10-10 24-13 42-9-7-16-20-31-39-42-9-5-18-8-23-10z"
          fill="#0f63cd"
          opacity="0.4"
        />
        <path
          d="M24 59c17-10 38-10 55-2 14 7 22 16 28 28-8-4-16-7-27-7-19 0-33 10-41 31-7 17-9 37-22 51-7 8-16 11-25 9 9 15 28 20 43 13 15-8 25-25 32-49 8-26 20-39 39-44 13-4 26-3 38 3-5-15-14-27-28-37-24-17-58-15-92 4z"
          fill="url(#waveFoam)"
          opacity="0.86"
        />
        <circle cx="47" cy="28" r="8" fill="url(#waveFoam)" stroke="#7fd5ff" stroke-width="2" />
        <circle cx="22" cy="88" r="10" fill="url(#waveFoam)" stroke="#7fd5ff" stroke-width="2" />
        <circle cx="100" cy="21" r="7" fill="url(#waveFoam)" stroke="#7fd5ff" stroke-width="2" />

        <path
          d="M193 10l26 12 25-15 4 28 28 4-15 24 12 26-28 2-6 27-24-15-24 15-6-27-29-2 12-26-15-24 29-4 3-25z"
          fill="#2a8dff"
          stroke="#0f57af"
          stroke-width="5"
          opacity="0.95"
        />

        <text
          x="132"
          y="74"
          fill="url(#superFill)"
          stroke="#083c88"
          stroke-width="9"
          paint-order="stroke fill"
          font-family="'Trebuchet MS', 'Arial Black', sans-serif"
          font-size="56"
          font-weight="900"
          font-style="italic"
          letter-spacing="-2"
        >
          Super
        </text>
        <text
          x="145"
          y="130"
          fill="url(#flowFill)"
          stroke="#083c88"
          stroke-width="9"
          paint-order="stroke fill"
          font-family="'Trebuchet MS', 'Arial Black', sans-serif"
          font-size="70"
          font-weight="900"
          font-style="italic"
          letter-spacing="-2"
        >
          Flow
        </text>
      </g>
    </svg>
  </body>
</html>
